<!DOCTYPE html>
<html>

<body>
    <nav>
        <button onclick="showPage('home-page')">Trang chủ</button>
        <button onclick="showPage('about-page')">About Us</button>
        <button onclick="showPage('contact-page')">Liên hệ</button>
    </nav>

    <hr> <section id="home-page">
        <h2>Trọ Sinh Viên</h2>
        <input id="title" placeholder="New post" />
        <button onclick="createPost()">Add</button>
        <ul id="list"></ul>
    </section>

    <section id="about-page" style="display: none;">
        <h2>About Us</h2>
        <p>Chào mừng bạn đến với trang Trọ Sinh Viên! Chúng tôi giúp sinh viên tìm phòng trọ dễ dàng hơn.</p>
    </section>

    <section id="contact-page" style="display: none;">
        <h2>Liên hệ</h2>
        <p>Email: hotro@trosinhvien.com</p>
        <p>Số điện thoại: 0123 456 789</p>
    </section>

    <script>
        // --- NAVIGATION LOGIC ---
        function showPage(pageId) {
            // 1. Hide all pages first
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('about-page').style.display = 'none';
            document.getElementById('contact-page').style.display = 'none';

            // 2. Show only the page the user clicked on
            document.getElementById(pageId).style.display = 'block';
        }

        // --- EXISTING CRUD LOGIC ---
        /*
            | Method | Meaning         |
            | ------ | --------------- |
            | GET    | read data       |
            | POST   | create new data |
            | PUT    | update          |
            | DELETE | delete          |
        */

        const API = "https://testknpm-crud-web.onrender.com"

        async function loadPosts() {
            const res = await fetch(`${API}/posts`)
            const posts = await res.json()

            const list = document.getElementById("list")
            list.innerHTML = "" 

            posts.forEach(p => {
                const li = document.createElement("li")
                li.innerHTML = `
                ${p.title}
                <button onclick="editPost(${p.id}, '${p.title}')">Edit</button>
                <button onclick="deletePost(${p.id})">X</button>
                `
                list.appendChild(li)
            })
        }

        async function createPost() {
            const title = document.getElementById("title").value
            
            await fetch(`${API}/posts`, {
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ title }) 
            })

            loadPosts()
        }

        async function deletePost(id) {
            await fetch(`${API}/posts/${id}`, { method: "DELETE" })
            loadPosts()
        }

        async function editPost(id, oldTitle) {
            const newTitle = prompt("Edit title:", oldTitle)
            if (!newTitle) return

            await fetch(`${API}/posts/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title: newTitle })
            })

            loadPosts()
        }

        loadPosts()
        setInterval(loadPosts, 3000)
    </script>
</body>

</html>
