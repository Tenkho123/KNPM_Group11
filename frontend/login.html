<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Trọ Sinh Viên Huế</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/auth.css">
    <link rel="stylesheet" href="./css/home.css">
    <script src="./js/main.js" defer></script>
</head>

<body>
    <section class="container header-container">
        
        <div id="header-placeholder"></div>

        <section class="container">
            <div class="auth-wrapper">
                <div class="auth-box">
                    <h2 class="auth-title">Đăng Nhập Hệ Thống</h2>
                    <p class="auth-subtitle">Chào mừng bạn quay lại với Trọ Sinh Viên Huế</p>

                    <form id="loginForm" action="#" method="POST">
                        <div class="input-group">
                            <label for="username">Tên đăng nhập / Email <span style="color: red;">*</span></label>
                            <div class="input-icon">
                                <i class="fa-regular fa-user"></i>
                                <input type="text" id="username" placeholder="Nhập email hoặc tên đăng nhập" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="password">Mật khẩu <span style="color: red;">*</span></label>
                            <div class="input-icon">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                            </div>
                        </div>

                        <div class="auth-options">
                            <label class="remember-me">
                                <input type="checkbox"> Ghi nhớ đăng nhập
                            </label>
                            <a href="#" class="forgot-password">Quên mật khẩu?</a>
                        </div>

                        <button type="submit" class="btn-auth">ĐĂNG NHẬP</button>
                    </form>

                    <div class="auth-footer">
                        <p>Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
                    </div>
                </div>
            </div>
        </section>

</body>

</html>
